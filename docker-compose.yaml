services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aviation_poc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "8050:8050"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aviation_poc
      LEDGER_BACKEND: postgres
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8050"
      LOG_LEVEL: INFO
      ANTHROPIC_API_KEY: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
    depends_on:
      - postgres
volumes:
  postgres_data: {}
